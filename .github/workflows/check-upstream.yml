name: Check upstream updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout downstream repository
        uses: actions/checkout@v4

      - name: Compare tracked upstream revision
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream https://github.com/thedivergentai/GD-Agentic-Skills.git
          git fetch upstream main --no-tags

          CURRENT="$(cat .upstream-revision)"
          LATEST="$(git rev-parse upstream/main)"

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT" != "$LATEST" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git log --oneline "$CURRENT..$LATEST" > upstream-log.txt || true
            git diff --name-status "$CURRENT..$LATEST" > upstream-files.txt || true
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            : > upstream-log.txt
            : > upstream-files.txt
          fi

      - name: Create upstream sync issue
        if: steps.upstream.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const current = '${{ steps.upstream.outputs.current }}';
            const latest = '${{ steps.upstream.outputs.latest }}';
            const shortLatest = latest.slice(0, 7);
            const title = `Upstream update available: ${shortLatest}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const existing = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            if (existing.data.some(issue => issue.title === title)) {
              core.info(`Issue already exists: ${title}`);
              return;
            }

            const log = fs.readFileSync('upstream-log.txt', 'utf8').trim() || '(no commit log available)';
            const files = fs.readFileSync('upstream-files.txt', 'utf8').trim() || '(no file list available)';

            const body = [
              `Original upstream: https://github.com/thedivergentai/GD-Agentic-Skills`,
              ``,
              `Tracked upstream revision: \`${current}\``,
              `Latest upstream revision: \`${latest}\``,
              ``,
              `Review these upstream changes, port relevant updates to the C# skill files, then update \`.upstream-revision\`.`,
              ``,
              `## Commits`,
              '```text',
              log,
              '```',
              ``,
              `## Changed files`,
              '```text',
              files,
              '```',
              ``,
              `See \`UPSTREAM.md\` for the recommended sync flow.`,
            ].join('\n');

            await github.rest.issues.create({ owner, repo, title, body });
